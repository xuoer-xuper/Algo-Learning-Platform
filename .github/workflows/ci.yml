name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    name: Validate Electron project
    runs-on: windows-latest
    defaults:
      run:
        working-directory: algo-electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: algo-electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run automated validation
        run: npm run test:all

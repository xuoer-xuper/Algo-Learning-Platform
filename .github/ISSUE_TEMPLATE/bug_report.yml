name: Bug report
description: Report an application bug that is not specific to one OJ submission monitor.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include Cookie values, session tokens, csrf tokens, user source code, full request bodies, or local database file contents.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and the affected workflow.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the minimal steps needed to reproduce the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Browser / tabs
        - Problems
        - Submissions
        - Analytics
        - Notes
        - Settings
        - User scripts
        - Database
        - Packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Include safe logs, screenshots, or test output. Redact sensitive values.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I did not include Cookie, session, csrf token, user source code, full request body, or local database file content.
          required: true
